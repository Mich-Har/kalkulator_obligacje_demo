// ============================================================
// HELPER FUNCTIONS
// ============================================================

function formatPLN(n) {
  if (n == null || isNaN(n)) return '0 zł';
  const neg = n < 0;
  const abs = Math.abs(Math.round(n * 100) / 100);
  const parts = abs.toFixed(2).split('.');
  const intPart = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
  const dec = parts[1];
  const str = dec === '00' ? intPart : intPart + ',' + dec;
  return (neg ? '-' : '') + str + ' zł';
}

function formatPct(n, decimals = 2) {
  if (n == null || isNaN(n)) return '0%';
  return n.toFixed(decimals).replace('.', ',') + '%';
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function interpolateLinear(start, end, count) {
  if (count <= 1) return [start];
  const result = [];
  for (let i = 0; i < count; i++) {
    result.push(Math.round((start + (end - start) * i / (count - 1)) * 100) / 100);
  }
  return result;
}

function pluralYears(n) {
  if (n === 1) return '1 rok';
  if (n >= 2 && n <= 4) return n + ' lata';
  return n + ' lat';
}

// ============================================================
// CALCULATION ENGINE
// ============================================================

function getIndicator(array, afterYear12, year) {
  return year <= 12 ? (array[year - 1] ?? afterYear12) : afterYear12;
}

function getRate(product, year, indicators) {
  if (year === 1) return product.initialRate;
  if (product.indexType === 'fixed') return product.fixedRate || product.initialRate;
  if (product.indexType === 'inflation_benchmark') return indicators.inflation[year - 1] ?? 3.0;

  const prevYear = year - 1;
  let base = 0;
  if (product.indexType === 'inflation') base = indicators.inflation[prevYear] ?? 3.0;
  else if (product.indexType === 'nbp_ref') base = indicators.nbpRate[prevYear] ?? 3.75;
  else if (product.indexType === 'wibor6m') base = indicators.wibor6m[prevYear] ?? 3.6;
  return Math.max(0, base + product.margin);
}

function buildIndicators(state) {
  const h = state.horizon;
  const result = { inflation: [], nbpRate: [], wibor6m: [], depositRate: [] };
  for (let y = 1; y <= h; y++) {
    result.inflation.push(getIndicator(state.inflationByYear, state.indicatorAfterYear12.inflation, y));
    result.nbpRate.push(getIndicator(state.nbpRateByYear, state.indicatorAfterYear12.nbpRate, y));
    result.wibor6m.push(getIndicator(state.wibor6mByYear, state.indicatorAfterYear12.wibor6m, y));
    result.depositRate.push(getIndicator(state.depositRateByYear, state.indicatorAfterYear12.depositRate, y));
  }
  return result;
}

function calculateCumulativeInflation(indicators, horizon) {
  const cumInf = [1];
  for (let y = 1; y <= horizon; y++) {
    cumInf.push(cumInf[y - 1] * (1 + (indicators.inflation[y - 1] ?? 3.0) / 100));
  }
  return cumInf;
}

function calculateProductYearly(product, bondCount, horizon, indicators) {
  const capital = bondCount * 100;
  const yearly = [{ year: 0, value: capital, rate: 0 }];

  if (product.indexType === 'inflation_benchmark') {
    let cumInf = 1;
    for (let y = 1; y <= horizon; y++) {
      cumInf *= (1 + (indicators.inflation[y - 1] ?? 3.0) / 100);
      yearly.push({ year: y, value: capital * cumInf, rate: indicators.inflation[y - 1] ?? 3.0 });
    }
    return yearly;
  }

  if (product.couponType === 'coupon') {
    let totalCoupons = 0;
    for (let y = 1; y <= horizon; y++) {
      const rate = getRate(product, y, indicators);
      const coupon = capital * rate / 100;
      totalCoupons += coupon;
      yearly.push({ year: y, value: capital + totalCoupons, rate });
    }
    return yearly;
  }

  // Capitalization
  let value = capital;
  for (let y = 1; y <= horizon; y++) {
    const rate = getRate(product, y, indicators);
    value = value * (1 + rate / 100);
    yearly.push({ year: y, value, rate });
  }
  return yearly;
}

function applyEarlyRedemption(finalValue, product, bondCount, horizon, capital) {
  const maturityYears = product.maturityMonths ? product.maturityMonths / 12 : null;
  let redemptionCost = 0;
  if (maturityYears && horizon < maturityYears && product.earlyRedemptionFee > 0) {
    redemptionCost = product.earlyRedemptionFee * bondCount;
    finalValue -= redemptionCost;
    if (product.nominalProtection) {
      finalValue = Math.max(finalValue, capital - redemptionCost);
    }
  }
  return { finalValue, redemptionCost };
}

function calculateIkeFees(totalBonds, horizon, additionalCosts) {
  const fees = [];
  let total = 0;
  for (let y = 1; y <= horizon; y++) {
    const feeRate = IKE_FEE_RATES[y] !== undefined ? IKE_FEE_RATES[y] : IKE_FEE_RATE_DEFAULT;
    const nominal = totalBonds * 100;
    const rawFee = nominal * feeRate;
    const fee = Math.min(rawFee, IKE_FEE_CAP) + additionalCosts;
    fees.push({ year: y, contractYear: y, feeRate, rawFee, fee });
    total += fee;
  }
  return { fees, total };
}

// Calculate IKE fee per year for the whole portfolio, then return product's share
function getProductIkeFeeShare(totalBonds, productBonds, year, additionalCosts) {
  if (totalBonds <= 0) return 0;
  const feeRate = IKE_FEE_RATES[year] !== undefined ? IKE_FEE_RATES[year] : IKE_FEE_RATE_DEFAULT;
  const nominal = totalBonds * 100;
  const rawFee = nominal * feeRate;
  const totalFee = Math.min(rawFee, IKE_FEE_CAP) + additionalCosts;
  return totalFee * (productBonds / totalBonds);
}

function applyIkeFeesToYearly(yearly, productBonds, totalBonds, horizon, additionalCosts) {
  const result = [{ ...yearly[0] }];
  const ikeFees = [];
  for (let y = 1; y <= horizon; y++) {
    const fee = getProductIkeFeeShare(totalBonds, productBonds, y, additionalCosts);
    ikeFees.push(fee);

    let val = yearly[y].value;
    // Fee from previous year deducted at start of current year
    if (y >= 2 && ikeFees[y - 2] !== undefined) {
      val -= ikeFees[y - 2];
    }
    result.push({ ...yearly[y], value: val, ikeFee: fee });
  }
  if (horizon >= 1) {
    result[horizon].value -= ikeFees[horizon - 1];
  }
  return result;
}

function estimateIkeCost(totalBonds, horizon) {
  const { total } = calculateIkeFees(totalBonds, horizon, 0);
  return total;
}

function generateInsights(variants, state, totalCapital, cumInflation, indicators) {
  const insights = [];
  if (variants.length === 0) return insights;

  const noIkeVariants = variants.filter(v => v.variantType === 'NO_IKE');
  const ikeVariants = variants.filter(v => v.variantType === 'IKE_MET');

  if (noIkeVariants.length > 0) {
    const best = noIkeVariants[0];
    insights.push(`Najlepszy wynik bez IKE: ${PRODUCT_NAMES[best.productId] || best.label} — ${formatPLN(best.finalValue)} (${best.returnPct >= 0 ? '+' : ''}${formatPct(best.returnPct)}).`);
  }

  if (ikeVariants.length > 0 && noIkeVariants.length > 0) {
    const bestIke = ikeVariants[0];
    const bestNoIke = noIkeVariants[0];
    const totalBonds = state.products.reduce((s, p) => s + (p.count || 0), 0);
    const ikeFees = calculateIkeFees(totalBonds, state.horizon, state.ikeAdditionalCosts || 0);
    if (bestIke.finalValue > bestNoIke.finalValue) {
      const benefit = bestIke.finalValue - bestNoIke.finalValue;
      insights.push(`Z IKE zyskujesz ${formatPLN(benefit)} więcej mimo kosztów prowadzenia (${formatPLN(ikeFees.total)}).`);
    } else {
      insights.push(`Koszty IKE (${formatPLN(ikeFees.total)}) pochłaniają korzyść podatkową przy tym horyzoncie.`);
    }
  }

  if (noIkeVariants.length >= 2) {
    const first = noIkeVariants[0];
    const second = noIkeVariants[1];
    const diff = first.finalValue - second.finalValue;
    if (diff > 0) {
      insights.push(`${PRODUCT_SHORT[first.productId]} daje ${formatPLN(diff)} więcej niż ${PRODUCT_SHORT[second.productId]}.`);
    }
  }

  const lokVariant = noIkeVariants.find(v => v.productId === 'LOK');
  if (lokVariant) {
    const lokCapital = lokVariant.yearlyValues[0]?.value || 0;
    if (lokVariant.realValue >= lokCapital) {
      insights.push('Lokata utrzymuje realną wartość w tym scenariuszu.');
    } else {
      insights.push('Lokata traci realną wartość — inflacja wyprzedza oprocentowanie.');
    }
  }

  return insights;
}

// ============================================================
// MAIN SIMULATION — always computes NO_IKE + IKE_MET per product
// Optional withdrawals: { [productId]: { year, count } }
// ============================================================

function calculateSimulation(state, withdrawals) {
  const horizon = state.horizon;
  const indicators = buildIndicators(state);
  const cumInflation = calculateCumulativeInflation(indicators, horizon);
  const activeProducts = state.products.filter(p => (p.count || 0) > 0);
  const totalBonds = activeProducts.reduce((s, p) => s + p.count, 0);
  const totalCapital = totalBonds * 100;

  const variants = [];

  for (const product of activeProducts) {
    const bondCount = product.count;
    const capital = bondCount * 100;
    const yearly = calculateProductYearly(product, bondCount, horizon, indicators);

    // Withdrawal calculations for this product
    const w = withdrawals && withdrawals[product.productId]
      && withdrawals[product.productId].year >= 1
      && withdrawals[product.productId].year <= horizon
      && withdrawals[product.productId].count > 0
      ? withdrawals[product.productId] : null;

    let withdrawnGross = 0;
    let withdrawnRedemptionFee = 0;
    let remainingBonds = bondCount;
    let scaleFactor = 1;

    if (w && w.count < bondCount) {
      const wCount = Math.min(w.count, bondCount - 1);
      remainingBonds = bondCount - wCount;
      scaleFactor = remainingBonds / bondCount;

      const valueAtW = yearly[w.year].value;
      let wValue = valueAtW * (wCount / bondCount);

      const matYears = product.maturityMonths ? product.maturityMonths / 12 : null;
      if (matYears && w.year < matYears && product.earlyRedemptionFee > 0) {
        withdrawnRedemptionFee = product.earlyRedemptionFee * wCount;
        wValue -= withdrawnRedemptionFee;
        if (product.nominalProtection) {
          wValue = Math.max(wValue, wCount * 100 - withdrawnRedemptionFee);
        }
      }
      withdrawnGross = wValue;
    }

    // --- NO_IKE variant ---
    const noIkeYearly = yearly.map(y => ({ ...y }));
    if (scaleFactor < 1 && w) {
      for (let y = w.year; y <= horizon; y++) {
        noIkeYearly[y] = { ...noIkeYearly[y], value: noIkeYearly[y].value * scaleFactor };
      }
    }

    let noIkeFinalRaw = noIkeYearly[horizon].value;
    const { finalValue: noIkeAfterRedemption, redemptionCost: noIkeRedemption } = applyEarlyRedemption(
      noIkeFinalRaw, product, remainingBonds, horizon, remainingBonds * 100
    );

    const noIkeTotalGross = noIkeAfterRedemption + withdrawnGross;
    const noIkeProfit = noIkeTotalGross - capital;
    const noIkeTax = Math.max(0, noIkeProfit) * 0.19;
    const noIkeAfterTax = noIkeTotalGross - noIkeTax;
    const noIkeReal = noIkeAfterTax / cumInflation[horizon];

    const noIkeYearlyFinal = noIkeYearly.map((y, i) => {
      let val = y.value;
      if (w && i >= w.year) val += withdrawnGross;
      return { ...y, value: val, realValue: val / cumInflation[i] };
    });

    variants.push({
      productId: product.productId,
      variantType: 'NO_IKE',
      label: PRODUCT_SHORT[product.productId],
      bondCount,
      yearlyValues: noIkeYearlyFinal,
      finalValueGross: noIkeTotalGross,
      finalValue: noIkeAfterTax,
      realValue: noIkeReal,
      tax: noIkeTax,
      redemptionCost: noIkeRedemption + withdrawnRedemptionFee,
      withdrawnRedemptionFee,
      withdrawnGross,
      ikeCost: 0,
      profit: noIkeAfterTax - capital,
      returnPct: ((noIkeAfterTax - capital) / capital) * 100,
    });

    // --- IKE_MET variant ---
    const ikeBaseYearly = yearly.map(y => ({ ...y }));
    if (scaleFactor < 1 && w) {
      for (let y = w.year; y <= horizon; y++) {
        ikeBaseYearly[y] = { ...ikeBaseYearly[y], value: ikeBaseYearly[y].value * scaleFactor };
      }
    }

    // IKE fees distributed proportionally based on total portfolio
    const totalBondsForIke = activeProducts.reduce((s, p) => {
      const pw = withdrawals && withdrawals[p.productId];
      if (pw && pw.count > 0) return s + Math.max(0, p.count - pw.count);
      return s + p.count;
    }, 0);

    const ikeYearly = applyIkeFeesToYearly(ikeBaseYearly, remainingBonds, totalBondsForIke, horizon, state.ikeAdditionalCosts || 0);
    let ikeFinalRaw = ikeYearly[horizon].value;
    const { finalValue: ikeAfterRedemption, redemptionCost: ikeRedemption } = applyEarlyRedemption(
      ikeFinalRaw, product, remainingBonds, horizon, remainingBonds * 100
    );

    const ikeTotalGross = ikeAfterRedemption + withdrawnGross;
    const productIkeCost = calculateIkeFees(totalBondsForIke, horizon, state.ikeAdditionalCosts || 0).total * (remainingBonds / Math.max(1, totalBondsForIke));

    const ikeYearlyFinal = ikeYearly.map((y, i) => {
      let val = y.value;
      if (w && i >= w.year) val += withdrawnGross;
      return { ...y, value: val, realValue: val / cumInflation[i] };
    });

    variants.push({
      productId: product.productId,
      variantType: 'IKE_MET',
      label: PRODUCT_SHORT[product.productId] + ' (IKE)',
      bondCount,
      yearlyValues: ikeYearlyFinal,
      finalValueGross: ikeTotalGross,
      finalValue: ikeTotalGross,
      realValue: ikeTotalGross / cumInflation[horizon],
      tax: 0,
      redemptionCost: ikeRedemption + withdrawnRedemptionFee,
      withdrawnRedemptionFee,
      withdrawnGross,
      ikeCost: productIkeCost,
      profit: ikeTotalGross - capital,
      returnPct: ((ikeTotalGross - capital) / capital) * 100,
    });
  }

  variants.sort((a, b) => b.finalValue - a.finalValue);

  // "Do nothing" line — purchasing power decline
  const doNothingLine = [{ year: 0, value: totalCapital }];
  for (let y = 1; y <= horizon; y++) {
    doNothingLine.push({ year: y, value: totalCapital / cumInflation[y] });
  }

  // Inflation accumulation line (how much you need to keep up)
  const inflationLine = [{ year: 0, value: totalCapital }];
  let cumI = 1;
  for (let y = 1; y <= horizon; y++) {
    cumI *= (1 + (indicators.inflation[y - 1] ?? 3.0) / 100);
    inflationLine.push({ year: y, value: totalCapital * cumI });
  }

  const insights = generateInsights(variants, state, totalCapital, cumInflation, indicators);

  const noIkeVariants = variants.filter(v => v.variantType === 'NO_IKE');
  const ikeVariants = variants.filter(v => v.variantType === 'IKE_MET');
  const bestNoIke = noIkeVariants[0];
  const bestIke = ikeVariants[0];
  const best = variants[0];

  const summary = {
    totalCapital,
    totalBonds,
    bestVariant: best,
    bestFinalValue: best ? best.finalValue : totalCapital,
    bestRealValue: best ? best.realValue : totalCapital,
    bestProfit: best ? best.profit : 0,
    bestTax: best ? best.tax : 0,
    ikeBenefit: (bestIke && bestNoIke) ? bestIke.finalValue - bestNoIke.finalValue : 0,
  };

  return { summary, variants, inflationLine, doNothingLine, cumInflation, indicators, insights, horizon };
}

// ============================================================
// TOOLTIP — popup chmurka (click to open/close)
// ============================================================

function TooltipInfo({ text, variant }) {
  const [open, setOpen] = React.useState(false);
  const btnRef = React.useRef(null);
  const tipRef = React.useRef(null);
  const [tipStyle, setTipStyle] = React.useState(null);
  const isWarning = variant === 'warning';

  React.useEffect(() => {
    if (!open) return;
    if (btnRef.current) {
      const rect = btnRef.current.getBoundingClientRect();
      const tipW = 280;
      let left = rect.left + rect.width / 2 - tipW / 2;
      left = Math.max(8, Math.min(left, window.innerWidth - tipW - 8));
      const spaceAbove = rect.top;
      const showBelow = spaceAbove < 120;
      setTipStyle({
        position: 'fixed',
        left: left + 'px',
        width: tipW + 'px',
        ...(showBelow
          ? { top: (rect.bottom + 8) + 'px' }
          : { top: (rect.top - 8) + 'px', transform: 'translateY(-100%)' }),
        zIndex: 10000,
      });
    }
    const handleClickOutside = (e) => {
      if (btnRef.current && !btnRef.current.contains(e.target) &&
          tipRef.current && !tipRef.current.contains(e.target)) {
        setOpen(false);
      }
    };
    document.addEventListener('mousedown', handleClickOutside);
    return () => document.removeEventListener('mousedown', handleClickOutside);
  }, [open]);

  const bgClosed = isWarning ? 'var(--warning-light)' : 'var(--surface-2)';
  const borderClosed = isWarning ? '1px solid var(--warning)' : '1px solid var(--border)';
  const colorClosed = isWarning ? 'var(--warning)' : 'var(--text-3)';

  return (
    <span style={{ position: 'relative', display: 'inline-flex', verticalAlign: 'middle' }}>
      <button ref={btnRef} onClick={(e) => { e.stopPropagation(); setOpen(!open); }}
        style={{
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
          width: '16px', height: '16px', borderRadius: '50%',
          background: open ? (isWarning ? 'var(--warning)' : 'var(--accent)') : bgClosed,
          border: open ? (isWarning ? '1px solid var(--warning)' : '1px solid var(--accent)') : borderClosed,
          fontSize: '0.6rem', color: open ? '#fff' : colorClosed,
          cursor: 'pointer', marginLeft: '4px', fontWeight: 700,
          fontFamily: 'inherit', padding: 0, lineHeight: 1,
          transition: 'all 0.15s ease',
        }}>
        {isWarning ? '!' : '?'}
      </button>
      {open && tipStyle && (
        <div ref={tipRef} style={{
          ...tipStyle,
          background: isWarning ? 'var(--warning)' : 'var(--text)', color: '#fff',
          padding: '10px 14px', borderRadius: 'var(--radius-sm)',
          fontSize: '0.78rem', lineHeight: 1.55,
          boxShadow: '0 8px 24px rgba(0,0,0,0.15)', fontWeight: 400,
          pointerEvents: 'auto', wordBreak: 'break-word', overflowWrap: 'break-word',
          whiteSpace: 'normal', boxSizing: 'border-box',
        }}>
          {text}
        </div>
      )}
    </span>
  );
}

function NumericInput({ value, onChange, min = 1, max = 1000000, step = 1, label }) {
  const handleDec = () => onChange(Math.max(min, value - step));
  const handleInc = () => onChange(Math.min(max, value + step));
  const handleChange = (e) => {
    const v = parseInt(e.target.value);
    if (!isNaN(v)) onChange(clamp(v, min, max));
    else if (e.target.value === '') onChange(min);
  };
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
      {label && <span style={{ fontSize: '0.85rem', color: 'var(--text-2)', marginRight: '0.5rem' }}>{label}</span>}
      <button onClick={handleDec} style={btnCircleStyle} title="Zmniejsz">{'\u2212'}</button>
      <input type="number" value={value} onChange={handleChange} min={min} max={max} step={step}
        style={{ ...inputBaseStyle, width: '100px', textAlign: 'center', fontSize: '1.25rem', fontWeight: 600 }} />
      <button onClick={handleInc} style={btnCircleStyle} title="Zwiększ">+</button>
    </div>
  );
}

function PercentageInput({ value, onChange, min = 0, max = 50, compact = false }) {
  const handleChange = (e) => {
    const raw = e.target.value.replace(',', '.');
    if (raw === '' || raw === '-') { onChange(0); return; }
    const v = parseFloat(raw);
    if (!isNaN(v)) onChange(clamp(v, min, max));
  };
  return (
    <div style={{ position: 'relative', display: 'inline-flex', alignItems: 'center' }}>
      <input type="text" value={String(value).replace('.', ',')} onChange={handleChange}
        style={{ ...inputBaseStyle, width: compact ? '70px' : '90px', paddingRight: '24px',
          textAlign: 'right', fontSize: compact ? '0.85rem' : '1rem',
          padding: compact ? '6px 24px 6px 8px' : '10px 24px 10px 14px' }} />
      <span style={{ position: 'absolute', right: '10px', color: 'var(--text-3)', fontSize: compact ? '0.8rem' : '0.9rem', pointerEvents: 'none' }}>%</span>
    </div>
  );
}

 {/* Who is it for */}

            { step: '3', title: 'Poznaj IKE-Obligacje', desc: 'Dowiedz się jak Indywidualne Konto Emerytalne wpływa na Twoje zyski. W wynikach przełącz IKE ON/OFF.' },

// ============================================================
// STEP 1: PORTFOLIO VIEW — products + indicators combined
// ============================================================

function PortfolioView({ state, setState, onNext, onBack }) {
  const [phase, setPhase] = React.useState('products');
  const [showFloating, setShowFloating] = React.useState(false);
  const headerRef = React.useRef(null);

  // Show floating bar only when the header card scrolls out of view
  React.useEffect(() => {
    const el = headerRef.current;
    if (!el) return;
    const observer = new IntersectionObserver(
      ([entry]) => setShowFloating(!entry.isIntersecting),
      { threshold: 0 }
    );
    observer.observe(el);
    return () => observer.disconnect();
  }, []);

  const bonds = state.products.filter(p => !['LOK', 'KOS'].includes(p.productId));
  const refs = state.products.filter(p => ['LOK', 'KOS'].includes(p.productId));
  const bondsTotal = bonds.reduce((s, p) => s + (p.count || 0), 0);
  const totalBonds = state.products.reduce((s, p) => s + (p.count || 0), 0);
  const totalCapital = totalBonds * 100;
  const horizon = state.horizon;
  const activeProducts = state.products.filter(p => (p.count || 0) > 0);
  const activeBonds = bonds.filter(p => (p.count || 0) > 0);
  const activeRefs = refs.filter(p => (p.count || 0) > 0);

  // Auto-sync LOK/KOS count to match total bond count
  React.useEffect(() => {
    let needsUpdate = false;
    const newProducts = state.products.map(p => {
      if (!['LOK', 'KOS'].includes(p.productId)) return p;
      if ((p.count || 0) <= 0) return p;
      const target = bondsTotal > 0 ? bondsTotal : 0;
      if (p.count !== target) { needsUpdate = true; return { ...p, count: target }; }
      return p;
    });
    if (needsUpdate) setState(prev => ({ ...prev, products: newProducts }));
  }, [bondsTotal]);

  // --- Product helpers ---
  const updateCount = (idx, count) => {
    setState(prev => ({
      ...prev,
      products: prev.products.map((p, i) => i === idx ? { ...p, count: Math.max(0, count) } : p),
    }));
  };

  const updateFixedRate = (idx, rate) => {
    setState(prev => ({
      ...prev,
      products: prev.products.map((p, i) => i === idx ? { ...p, fixedRate: rate, initialRate: rate } : p),
    }));
  };

  const toggleRef = (productId, on) => {
    setState(prev => ({
      ...prev,
      products: prev.products.map(p =>
        p.productId === productId ? { ...p, count: on ? Math.max(bondsTotal, 1) : 0 } : p
      ),
    }));
  };

  const getEarlyRedemptionWarning = (product) => {
    if (!product.maturityMonths) return null;
    const matYears = product.maturityMonths / 12;
    if (horizon < matYears) {
      return `Twój horyzont oszczędzania (${pluralYears(horizon)}) jest krótszy niż zapadalność obligacji (${pluralYears(matYears)}). Przy wcześniejszym wykupie zapłacisz ${product.earlyRedemptionFee} zł za każdą obligację. ${product.nominalProtection ? 'Ochrona nominalna gwarantuje zwrot co najmniej 100 zł minus opłata za wykup.' : ''}`;
    }
    return null;
  };

  const getCellValue = (product, key) => {
    switch (key) {
      case 'maturityMonths':
        if (!product.maturityMonths) return '\u2014';
        const y = product.maturityMonths / 12;
        return y === 1 ? '1 rok' : y <= 4 ? y + ' lata' : y + ' lat';
      case 'initialRate': return formatPct(product.initialRate);
      case 'rateChangeMonths': return product.rateChangeMonths ? product.rateChangeMonths + ' mc' : '\u2014';
      case 'indexLabel': return INDEX_LABELS[product.indexType] || '\u2014';
      case 'margin': return product.margin > 0 ? '+' + formatPct(product.margin) : '\u2014';
      case 'couponFrequencyMonths': return product.couponFrequencyMonths ? product.couponFrequencyMonths + ' mc' : '\u2014';
      case 'capitalizationMonths': return product.capitalizationMonths ? product.capitalizationMonths + ' mc' : '\u2014';
      case 'conversionPrice': return product.conversionPrice ? product.conversionPrice.toFixed(2) + ' zł' : '\u2014';
      case 'earlyRedemptionFee': return product.earlyRedemptionFee > 0 ? product.earlyRedemptionFee.toFixed(2) + ' zł' : '\u2014';
      case 'nominalProtectionMonths':
        if (!product.nominalProtection) return 'Nie';
        if (product.nominalProtectionMonths === 'full') return 'Pełny';
        return product.nominalProtectionMonths ? product.nominalProtectionMonths + ' mc' : 'Tak';
      default: return '\u2014';
    }
  };

  // --- Indicator helpers ---
  const applyPreset = (presetKey) => {
    const adv = PRESET_ADVANCED[presetKey];
    setState(prev => ({
      ...prev,
      preset: presetKey,
      inflationByYear: [...adv.inflation],
      nbpRateByYear: [...adv.nbpRate],
      wibor6mByYear: [...adv.wibor6m],
      depositRateByYear: [...adv.depositRate],
      indicatorAfterYear12: { ...adv.after12 },
    }));
  };

  const setSimpleValue = (key, arrayKey, value) => {
    setState(prev => ({
      ...prev,
      [arrayKey]: Array(12).fill(value),
      indicatorAfterYear12: { ...prev.indicatorAfterYear12, [key]: value },
    }));
  };

  const switchIndicatorMode = (mode) => {
    if (mode === state.indicatorMode) return;
    if (mode === 'scenario') {
      const presetKey = state.preset || 'bazowy';
      const adv = PRESET_ADVANCED[presetKey];
      setState(prev => ({
        ...prev, indicatorMode: 'scenario', preset: presetKey,
        inflationByYear: [...adv.inflation], nbpRateByYear: [...adv.nbpRate],
        wibor6mByYear: [...adv.wibor6m], depositRateByYear: [...adv.depositRate],
        indicatorAfterYear12: { ...adv.after12 },
      }));
    } else if (mode === 'simple') {
      setState(prev => ({
        ...prev, indicatorMode: 'simple',
        inflationByYear: Array(12).fill(prev.inflationByYear[0]),
        nbpRateByYear: Array(12).fill(prev.nbpRateByYear[0]),
        wibor6mByYear: Array(12).fill(prev.wibor6mByYear[0]),
        depositRateByYear: Array(12).fill(prev.depositRateByYear[0]),
      }));
    } else if (mode === 'advanced') {
      if (state.indicatorMode === 'simple') {
        const preset = PRESET_ADVANCED[state.preset || 'bazowy'];
        setState(prev => ({
          ...prev, indicatorMode: 'advanced',
          inflationByYear: [...preset.inflation], nbpRateByYear: [...preset.nbpRate],
          wibor6mByYear: [...preset.wibor6m], depositRateByYear: [...preset.depositRate],
          indicatorAfterYear12: { ...preset.after12 },
        }));
      } else {
        setState(prev => ({ ...prev, indicatorMode: 'advanced' }));
      }
    }
  };

  const indicatorItems = [
    { label: 'Inflacja CPI', key: 'inflation', arrayKey: 'inflationByYear', tooltip: INDICATOR_TOOLTIPS.inflation },
    { label: 'Stopa referencyjna NBP', key: 'nbpRate', arrayKey: 'nbpRateByYear', tooltip: INDICATOR_TOOLTIPS.nbpRate },
    { label: 'WIBOR 6M', key: 'wibor6m', arrayKey: 'wibor6mByYear', tooltip: INDICATOR_TOOLTIPS.wibor6m },
    { label: 'Lokata / Konto', key: 'depositRate', arrayKey: 'depositRateByYear', tooltip: INDICATOR_TOOLTIPS.depositRate },
  ];

  const getIndicatorRelevance = (key) => {
    const indexMap = { inflation: 'inflation', nbpRate: 'nbp_ref', wibor6m: 'wibor6m' };
    if (key === 'depositRate') {
      const relevant = activeProducts.filter(p => ['LOK', 'KOS'].includes(p.productId));
      return relevant.length > 0
        ? { names: relevant.map(p => PRODUCT_SHORT[p.productId]).join(', '), desc: 'Oprocentowanie ustawione ręcznie' }
        : null;
    }
    const indexType = indexMap[key];
    const relevant = activeProducts.filter(p => p.indexType === indexType);
    if (relevant.length === 0) return null;
    const names = relevant.map(p => PRODUCT_SHORT[p.productId]).join(', ');
    const descs = { inflation: 'Od 2. roku: inflacja + marża', nbpRate: 'Stopa NBP + marża', wibor6m: 'WIBOR 6M + marża' };
    return { names, desc: descs[key] };
  };

  // ==============================
  // RENDER
  // ==============================
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>

      {/* ═══ FLOATING SUMMARY — appears when header scrolls out of view ═══ */}
      {showFloating && (
        <div style={{
          position: 'fixed', top: 0, left: 0, right: 0, zIndex: 200,
          background: 'var(--surface)', borderBottom: '1px solid var(--border)',
          boxShadow: 'var(--shadow-md)', padding: '0.4rem 1.5rem',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          gap: '1rem',
        }}>
          {/* Left: Obligacje + chips */}
          <div style={{ display: 'flex', alignItems: 'center', gap: '0.4rem', flexWrap: 'wrap', flex: 1 }}>
            <span style={{ fontSize: '0.75rem', color: 'var(--text-3)', whiteSpace: 'nowrap' }}>Obligacje:</span>
            {activeBonds.length === 0 && (
              <span style={{ fontSize: '0.75rem', color: 'var(--text-3)' }}>brak</span>
            )}
            {activeBonds.map(p => (
              <span key={p.productId} style={{
                display: 'inline-block', padding: '1px 6px', borderRadius: '3px',
                fontSize: '0.65rem', fontWeight: 600,
                background: (PRODUCT_COLORS[p.productId] || 'var(--border)') + '18',
                color: PRODUCT_COLORS[p.productId] || 'var(--text-3)',
              }}>
                {PRODUCT_SHORT[p.productId]}{'\u00D7'}{p.count}
              </span>
            ))}
            {activeRefs.map(p => (
              <span key={p.productId} style={{
                display: 'inline-block', padding: '1px 6px', borderRadius: '3px',
                fontSize: '0.65rem', fontWeight: 600,
                background: (PRODUCT_COLORS[p.productId] || 'var(--border)') + '18',
                color: PRODUCT_COLORS[p.productId] || 'var(--text-3)',
              }}>
                {PRODUCT_SHORT[p.productId]}
              </span>
            ))}
          </div>
          {/* Right: Wartość + Okres */}
          <div style={{ display: 'flex', alignItems: 'center', gap: '1.25rem', flexShrink: 0 }}>
            <div style={{ textAlign: 'right' }}>
              <div style={{ fontSize: '1rem', color: 'var(--text-3)', lineHeight: 2 }}>Wartość portfela</div>
              <div style={{ fontSize: '1.2rem', fontWeight: 700, color: 'var(--navy)', lineHeight: 1.2 }}>
                {bondsTotal > 0 ? formatPLN(bondsTotal * 100) : '0 zł'}
              </div>
            </div>
            <div style={{ width: '1px', height: '28px', background: 'var(--border)' }} />
            <div style={{ textAlign: 'right' }}>
              <div style={{ fontSize: '1rem', color: 'var(--text-3)', lineHeight: 2 }}>Okres oszczędności</div>
              <div style={{ fontSize: '1.2rem', fontWeight: 700, color: 'var(--navy)', lineHeight: 1.2 }}>
                {pluralYears(horizon)}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ═══ PORTFOLIO HEADER — horizon picker ═══ */}
      <div ref={headerRef} style={{ ...cardStyle, padding: '1.25rem 1.5rem' }}>
        <div style={{ display: 'flex', gap: '1.5rem', alignItems: 'stretch' }}>

          {/* LEFT — portfolio value */}
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: '0.7rem', letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--text-3)', marginBottom: '0.3rem', fontWeight: 500 }}>
              Wartość portfela
            </div>
            <div style={{ fontSize: '1.6rem', fontWeight: 700, color: 'var(--navy)', lineHeight: 1, marginBottom: '0.6rem' }}>
              {bondsTotal > 0 ? formatPLN(bondsTotal * 100) : '0 zł'}
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: '0.35rem', flexWrap: 'wrap' }}>
              {activeBonds.length === 0 && activeRefs.length === 0
                ? <span style={{ fontSize: '0.72rem', color: 'var(--text-3)' }}>Brak obligacji w portfelu</span>
                : <>
                    {activeBonds.map(p => (
                      <span key={p.productId} style={{
                        display: 'inline-block', padding: '2px 7px', borderRadius: '4px',
                        fontSize: '0.65rem', fontWeight: 600,
                        background: (PRODUCT_COLORS[p.productId] || 'var(--border)') + '22',
                        color: PRODUCT_COLORS[p.productId] || 'var(--text-3)',
                        border: '1px solid ' + (PRODUCT_COLORS[p.productId] || 'var(--border)') + '44',
                      }}>
                        {PRODUCT_SHORT[p.productId]}{'\u00D7'}{p.count}
                      </span>
                    ))}
                    {activeRefs.map(p => (
                      <span key={p.productId} style={{
                        display: 'inline-block', padding: '2px 7px', borderRadius: '4px',
                        fontSize: '0.65rem', fontWeight: 500,
                        background: 'var(--surface-2)',
                        color: 'var(--text-3)',
                        border: '1px solid var(--border)',
                      }}>
                        {PRODUCT_SHORT[p.productId]}
                      </span>
                    ))}
                  </>
              }
            </div>
          </div>

          {/* Divider */}
          <div style={{ width: '1px', background: 'var(--border)', flexShrink: 0, alignSelf: 'stretch' }} />

          {/* RIGHT — horizon */}
          <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', justifyContent: 'space-between' }}>
            <div style={{ fontSize: '0.7rem', letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--text-3)', marginBottom: '0.3rem', fontWeight: 500 }}>
              Okres oszczędzania
            </div>
            <div style={{ fontSize: '1.6rem', fontWeight: 700, color: 'var(--navy)', lineHeight: 1, marginBottom: '0.6rem' }}>
              {pluralYears(horizon)}
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
              <span style={{ fontSize: '0.72rem', color: 'var(--text-3)', whiteSpace: 'nowrap' }}>1</span>
              <input type="range" min={1} max={50} step={1} value={horizon}
                onChange={e => setState(prev => ({ ...prev, horizon: parseInt(e.target.value) }))}
                style={{ flex: 1, height: '6px', appearance: 'none', background: 'var(--border)', borderRadius: '3px', outline: 'none', cursor: 'pointer', accentColor: 'var(--accent)' }} />
              <span style={{ fontSize: '0.72rem', color: 'var(--text-3)', whiteSpace: 'nowrap' }}>50 lat</span>
            </div>
          </div>

        </div>
      </div>

      {/* ═══════════════════════════════════════════
           PHASE: PRODUCTS
         ═══════════════════════════════════════════ */}
      {phase === 'products' && (
        <>
          {/* --- Bond products table --- */}
          {(() => {
            const KEY_COL_KEYS = ['maturityMonths', 'initialRate', 'indexLabel', 'margin', 'earlyRedemptionFee'];
            const tableExpanded = state.portfolioWide;
            const visibleCols = tableExpanded
              ? PRODUCT_TABLE_COLUMNS
              : PRODUCT_TABLE_COLUMNS.filter(c => KEY_COL_KEYS.includes(c.key));

            return (
              <div style={{ ...cardStyle, padding: '1.5rem 0 1.5rem 1.25rem', position: 'relative', overflow: 'hidden' }}>
                {/* Card header */}
                <div style={{ marginBottom: '1rem', paddingRight: '3.5rem' }}>
                  <SectionLabel>Obligacje skarbowe</SectionLabel>
                </div>
              <div style={{ fontSize: '0.8rem', color: 'var(--text-2)', marginBottom: '1rem', lineHeight: 1.5, paddingRight: '3.5rem' }}>
  
  <div style={{ fontSize: '0.85rem', fontWeight: 600, marginBottom: '0.5rem' }}>
    Czym są obligacje skarbowe?
  </div>

  <div style={{ fontSize: '0.8rem', color: 'var(--text-2)', lineHeight: 1.7 }}>
    Obligacje skarbowe to papiery wartościowe emitowane przez Skarb Państwa. Kupujesz je po 100 zł za sztukę.
    Państwo pożycza od Ciebie pieniądze i oddaje je z odsetkami po określonym czasie.
    Są uważane za jedną z najbezpieczniejszych form oszczędzania — gwarantem jest budżet państwa.
    Dostępne typy różnią się oprocentowaniem, długością trwania i sposobem naliczania odsetek.
  </div>

  <div style={{ 
    fontSize: '0.85rem',
    fontWeight: 600,
    marginTop: '1rem',
    marginBottom: '1rem'
  }}>
    Wybierz obligacje do swojego portfela:
  </div>

</div>

                {/* Table */}
                <div style={{ border: '1px solid var(--border)', borderRadius: 'var(--radius)', marginRight: '3.5rem' }}>
                  <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.78rem' }}>
                    <thead>
                      <tr>
                        <th style={{ ...thStyle, position: 'sticky', left: 0, background: 'var(--surface)', zIndex: 2, minWidth: '120px', padding: '10px 6px' }}>
                          Obligacja
                        </th>
                        <th style={{ ...thStyle, minWidth: '80px', textAlign: 'center', padding: '10px 4px' }}>Ile szt.</th>
                        {visibleCols.map(col => (
                          <th key={col.key} style={{ ...thStyle, whiteSpace: 'nowrap', padding: '10px 5px', fontSize: '0.72rem' }}>
                            <span>{col.label}</span>
                            {col.tooltip && <TooltipInfo text={col.tooltip} />}
                          </th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {bonds.map(product => {
                        const idx = state.products.findIndex(p => p.productId === product.productId);
                        const warning = getEarlyRedemptionWarning(product);
                        const color = PRODUCT_COLORS[product.productId] || 'var(--text-3)';
                        const hasCount = (product.count || 0) > 0;
                        return (
                          <tr key={product.productId} style={{
                            background: hasCount ? 'var(--surface)' : 'var(--surface-2)',
                            opacity: hasCount ? 1 : 0.7, transition: 'all 0.2s ease',
                          }}>
                            <td style={{
                              ...tdStyle, position: 'sticky', left: 0, zIndex: 1, padding: '8px 6px',
                              background: hasCount ? 'var(--surface)' : 'var(--surface-2)',
                              borderLeft: `3px solid ${hasCount ? color : 'var(--border)'}`,
                            }}>
                              <div style={{ fontWeight: 600, color, fontSize: '0.82rem' }}>
                                {PRODUCT_SHORT[product.productId]}
                              </div>
                              <div style={{ fontSize: '0.65rem', color: 'var(--text-3)', lineHeight: 1.3 }}>
                                {PRODUCT_DESCRIPTIONS[product.productId]?.split('.')[0]}.
                              </div>
                              {['ROS', 'ROD'].includes(product.productId) && (
                                <div style={{ fontSize: '0.6rem', color: 'var(--success)', fontWeight: 500 }}>Rodzina 800+</div>
                              )}
                            </td>
                            <td style={{ ...tdStyle, textAlign: 'center', padding: '8px 4px' }}>

                                style={{
                                  ...inputBaseStyle, width: '66px', textAlign: 'center', padding: '5px 4px',
                                  fontSize: '0.82rem', fontWeight: hasCount ? 700 : 400,

                  padding: '1px 6px', borderRadius: '3px', fontSize: '0.65rem', fontWeight: 600,

              />

              <>

                    <button key={key} onClick={() => applyPreset(key)}

                        color: state.preset === key ? 'var(--accent)' : 'var(--text-2)',

                    padding: '0.75rem 1rem', fontSize: '0.8rem', color: 'var(--accent-dark)', lineHeight: 1.5,

                    const first = state[item.arrayKey][0];
                    const last = state[item.arrayKey][Math.min(11, horizon - 1)];

                    const relevance = getIndicatorRelevance(item.key);
                    return (
                      <div key={item.key} style={{
                        padding: '0.75rem', background: 'var(--surface-2)', borderRadius: 'var(--radius-sm)',

                          <div style={{ fontSize: '0.7rem', color: 'var(--text-3)', marginTop: '0.25rem' }}>

            {/* --- SIMPLE MODE --- */}
            {state.indicatorMode === 'simple' && (
              <div className="assumptions-grid" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1.25rem' }}>

                  const relevance = getIndicatorRelevance(item.key);
                  return (
                    <div key={item.key}>
                      <div style={{ fontSize: '0.85rem', fontWeight: 500, marginBottom: '0.25rem' }}>
                        {item.label}
                        <TooltipInfo text={item.tooltip} />
                      </div>
                      <PercentageInput value={state[item.arrayKey][0]} onChange={v => setSimpleValue(item.key, item.arrayKey, v)} />
                      {relevance && (
                        <div style={{ fontSize: '0.7rem', color: 'var(--success)', marginTop: '0.35rem' }}>
                          {'Wpływa na: '}{relevance.names}{' \u2014 '}{relevance.desc}
                        </div>
                      )}
                      {!relevance && (
                        <div style={{ fontSize: '0.7rem', color: 'var(--text-3)', marginTop: '0.35rem' }}>
                          Brak produktów w portfelu opartych o ten wskaźnik
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {/* --- ADVANCED MODE --- */}
            {state.indicatorMode === 'advanced' && (
              <>
                {/* Relevance summary */}
                <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap', marginBottom: '1rem' }}>
                  {indicatorItems.map(item => {
                    const relevance = getIndicatorRelevance(item.key);
                    return relevance ? (
                      <span key={item.key} style={{
                        padding: '3px 10px', borderRadius: '4px', fontSize: '0.7rem',
                        background: 'var(--success-light)', color: 'var(--success)',
                        border: '1px solid var(--success)',
                      }}>
                        {item.label} {'\u2192'} {relevance.names}
                      </span>
                    ) : null;
                  })}
                </div>
                <AdvancedIndicatorTable state={state} setState={setState} />
              </>
            )}
          </div>

          {/* Navigation */}
          <div className="btn-row" style={{ display: 'flex', justifyContent: 'space-between', gap: '0.75rem' }}>
            <button onClick={() => setPhase('products')} style={btnSecondaryStyle}>
              {'\u2190 Wróć do produktów'}
            </button>
            <button onClick={onNext} style={btnPrimaryStyle}
              onMouseOver={e => e.currentTarget.style.opacity = '0.9'}
              onMouseOut={e => e.currentTarget.style.opacity = '1'}>
              {'Dalej \u2192'}
            </button>
          </div>
        </>
      )}
    </div>
  );
}

// ============================================================
// ADVANCED INDICATOR TABLE (per-year editable)
// ============================================================

function AdvancedIndicatorTable({ state, setState }) {
  const [fillMode, setFillMode] = React.useState(null);
  const [fillTarget, setFillTarget] = React.useState('inflation');
  const [fillStart, setFillStart] = React.useState(4.0);
  const [fillEnd, setFillEnd] = React.useState(2.5);
  const [fillConst, setFillConst] = React.useState(3.0);

  const keys = [
    { key: 'inflationByYear', after: 'inflation', label: 'Inflacja' },
    { key: 'nbpRateByYear', after: 'nbpRate', label: 'Stopa NBP' },
    { key: 'wibor6mByYear', after: 'wibor6m', label: 'WIBOR 6M' },
    { key: 'depositRateByYear', after: 'depositRate', label: 'Lokata' },
  ];

  const setYearValue = (arrayKey, yearIdx, value) => {
    setState(prev => {
      const arr = [...prev[arrayKey]];
      arr[yearIdx] = value;
      return { ...prev, [arrayKey]: arr };
    });
  };

  const setAfterValue = (afterKey, value) => {
    setState(prev => ({
      ...prev,
      indicatorAfterYear12: { ...prev.indicatorAfterYear12, [afterKey]: value },
    }));
  };

  const applyFill = () => {
    const targetKey = keys.find(k => k.after === fillTarget);
    if (!targetKey) return;
    if (fillMode === 'linear') {
      const vals = interpolateLinear(fillStart, fillEnd, 12);
      setState(prev => ({ ...prev, [targetKey.key]: vals, indicatorAfterYear12: { ...prev.indicatorAfterYear12, [fillTarget]: fillEnd } }));
    } else {
      setState(prev => ({ ...prev, [targetKey.key]: Array(12).fill(fillConst), indicatorAfterYear12: { ...prev.indicatorAfterYear12, [fillTarget]: fillConst } }));
    }
    setFillMode(null);
  };

  return (
    <div>
      <div className="indicator-table-wrap" style={{ overflowX: 'auto' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.85rem' }}>
          <thead>
            <tr>
              <th style={thStyle}>Rok</th>
              {keys.map(k => <th key={k.key} style={thStyle}>{k.label}</th>)}
            </tr>
          </thead>
          <tbody>
            {Array.from({ length: 12 }, (_, i) => (
              <tr key={i}>
                <td style={tdStyle}>{i + 1}</td>
                {keys.map(k => (
                  <td key={k.key} style={{ ...tdStyle, padding: '4px' }}>
                    <PercentageInput compact value={state[k.key][i]} onChange={v => setYearValue(k.key, i, v)} />
                  </td>
                ))}
              </tr>
            ))}
            <tr style={{ background: 'var(--surface-2)' }}>
              <td style={{ ...tdStyle, fontWeight: 600, fontSize: '0.8rem' }}>Po r. 12</td>
              {keys.map(k => (
                <td key={k.key} style={{ ...tdStyle, padding: '4px' }}>
                  <PercentageInput compact value={state.indicatorAfterYear12[k.after]} onChange={v => setAfterValue(k.after, v)} />
                </td>
              ))}
            </tr>
          </tbody>
        </table>
      </div>

      <div style={{ display: 'flex', gap: '0.5rem', marginTop: '1rem', flexWrap: 'wrap' }}>
        <button onClick={() => setFillMode(fillMode === 'linear' ? null : 'linear')}
          style={{ ...btnSecondaryStyle, fontSize: '0.8rem', padding: '6px 14px' }}>
          Wypełnij liniowo
        </button>
        <button onClick={() => setFillMode(fillMode === 'constant' ? null : 'constant')}
          style={{ ...btnSecondaryStyle, fontSize: '0.8rem', padding: '6px 14px' }}>
          Ustaw stałą wartość
        </button>
      </div>

      {fillMode && (
        <div style={{ ...cardStyle, marginTop: '0.75rem', padding: '1rem', background: 'var(--surface-2)' }}>
          <div style={{ display: 'flex', gap: '0.75rem', alignItems: 'center', flexWrap: 'wrap' }}>
            <select value={fillTarget} onChange={e => setFillTarget(e.target.value)}
              style={{ ...inputBaseStyle, width: 'auto' }}>
              {keys.map(k => <option key={k.after} value={k.after}>{k.label}</option>)}
            </select>
            {fillMode === 'linear' ? (
              <>
                <span style={{ fontSize: '0.85rem', color: 'var(--text-2)' }}>od</span>
                <PercentageInput compact value={fillStart} onChange={setFillStart} />
                <span style={{ fontSize: '0.85rem', color: 'var(--text-2)' }}>do</span>
                <PercentageInput compact value={fillEnd} onChange={setFillEnd} />
              </>
            ) : (
              <>
                <span style={{ fontSize: '0.85rem', color: 'var(--text-2)' }}>wartość:</span>
                <PercentageInput compact value={fillConst} onChange={setFillConst} />
              </>
            )}
            <button onClick={applyFill} style={{ ...btnPrimaryStyle, padding: '6px 16px', fontSize: '0.8rem', minHeight: '32px' }}>
              Zastosuj
            </button>
          </div>
        </div>
      )}
    </div>
  );
}
